spring.application.name=fx-backend
server.port=8080

# Wise V3 Comparisons API — public, no auth required
fx.wise.base-url=https://api.wise.com
fx.wise.connect-timeout-ms=5000
fx.wise.read-timeout-ms=8000

# Per-corridor cache so we don't hammer Wise on every keystroke
fx.cache.sample-amount=1000
fx.cache.ttl-seconds=300

# Currency dropdown shown in the UI
fx.currencies.supported=USD,EUR,GBP,JPY,INR,MXN,PHP,AUD,CAD,SGD,CHF

# CORS origins for the local Vite dev server (override per environment)
fx.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*
